name: Scan catalogue (episodes, saisons, nouveaux animes VF)

on:
  schedule:
    # Une fois par jour a 4h UTC. Frequence volontairement moderee (pas
    # horaire) : ce scan interroge l'API interne Crunchyroll (protegee par
    # Cloudflare, deja documentee comme fragile dans les scripts) et pagine
    # tout le catalogue ADN/Crunchyroll ; un scan trop frequent augmente le
    # risque de blocage. Le rafraichissement horaire des dates "prochain
    # episode" reste gere cote client par app.js (syncWithAniList).
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Met a jour les totaux d'episodes et les saisons reelles (Crunchyroll + ADN)
        run: node scripts/update-episodes.js

      - name: Scanne les nouveaux animes doubles en VF sur Crunchyroll
        run: node scripts/cr-vf-scan.js

      # Revérifie les liens de plateforme (y compris pour les animés déjà
      # terminés, jamais couverts par les 2 etapes ci-dessus qui ne portent
      # que sur les totaux/nouveautes) : un lien retire sa licence sans que
      # rien ne le detecte sinon. continue-on-error car ces requetes passent
      # par les memes protections Cloudflare potentiellement bloquantes en CI.
      - name: Revérifie les liens Crunchyroll/ADN encore valides
        continue-on-error: true
        run: node scripts/check-availability.js

      - name: Revérifie les liens Netflix/Disney+/Prime Video encore valides
        continue-on-error: true
        run: node scripts/check-platform-links.js

      # Netflix/Disney+/Prime Video n'ont pas d'API de catalogue publique
      # comme Crunchyroll/ADN : JustWatch (agregateur) est la seule source
      # exploitable pour decouvrir de nouveaux liens/animes sur ces 3
      # plateformes. continue-on-error par prudence (dependance a un service
      # tiers), chaque passe (series/films) peut prendre plusieurs minutes.
      - name: Scanne Netflix/Disney+/Prime Video via JustWatch (séries)
        continue-on-error: true
        run: node scripts/justwatch-merge.js SHOW

      - name: Scanne Netflix/Disney+/Prime Video via JustWatch (films)
        continue-on-error: true
        run: node scripts/justwatch-merge.js MOVIE

      - name: Commit et push si le catalogue a change
        run: |
          if git diff --quiet -- catalog.js; then
            echo "Aucun changement detecte dans catalog.js."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp catalog.js /tmp/catalog.scan.js
          # Retry avec re-application du resultat du scan sur le HEAD distant
          # a jour : si quelqu'un pousse d'autres commits pendant que ce job
          # tourne (build long, plusieurs minutes), le push simple est rejete
          # (non-fast-forward) et le resultat du scan est perdu sans ca.
          for attempt in 1 2 3; do
            git add catalog.js
            git commit -m "chore: scan automatique du catalogue (episodes, saisons, nouveaux animes VF)"
            if git push; then
              echo "Push reussi (tentative $attempt)."
              exit 0
            fi
            echo "Push rejete (tentative $attempt/3), re-application sur le HEAD distant a jour..."
            git fetch origin master
            git reset --soft origin/master
            cp /tmp/catalog.scan.js catalog.js
          done
          echo "::error::Echec du push apres 3 tentatives, le prochain scan planifie reessaiera."
          exit 1
